<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-surface-container-lowest text-on-surface shadow-sm transition-all duration-200">

<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all duration-200">

                </button>
</div>

<p class="text-on-surface-variant text-sm">Enter your credentials to access your portfolio</p>

<!-- Form -->
<form class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container-highest border-0 rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline transition-all" id="email" placeholder="landlord@estatemetric.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container-highest border-0 rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full premium-gradient text-on-primary font-semibold py-4 rounded-lg shadow-lg shadow-primary/20 hover:shadow-primary/30 transition-all duration-200 active:scale-[0.98]" type="submit">

                </button>

<div class="relative flex justify-center text-xs uppercase tracking-widest">
