<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tenant Login | Estate Metric</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-tertiary-fixed-variant": "#2e6b57",
                "on-primary-fixed": "#354053",
                "tertiary": "#2c6a55",
                "on-secondary": "#f7f9ff",
                "secondary-container": "#d3e4fe",
                "tertiary-fixed-dim": "#aaead0",
                "on-tertiary-fixed": "#074e3b",
                "surface-container-highest": "#d9e4ea",
                "surface-bright": "#f7f9fb",
                "on-primary-container": "#475266",
                "primary-dim": "#485367",
                "on-secondary-fixed-variant": "#4d5d73",
                "inverse-on-surface": "#9a9d9f",
                "outline": "#717c82",
                "primary-fixed": "#d8e3fb",
                "on-surface": "#2a3439",
                "error-container": "#fe8983",
                "surface": "#f7f9fb",
                "on-primary-fixed-variant": "#515c70",
                "on-error-container": "#752121",
                "error-dim": "#4e0309",
                "surface-dim": "#cfdce3",
                "surface-container-lowest": "#ffffff",
                "outline-variant": "#a9b4b9",
                "secondary-fixed-dim": "#c5d6f0",
                "on-secondary-fixed": "#314055",
                "surface-container": "#e8eff3",
                "on-surface-variant": "#566166",
                "secondary-dim": "#44546a",
                "on-secondary-container": "#435368",
                "primary": "#545f73",
                "on-tertiary": "#e5fff2",
                "on-error": "#fff7f6",
                "on-background": "#2a3439",
                "secondary": "#506076",
                "inverse-surface": "#0b0f10",
                "inverse-primary": "#dae6fe",
                "tertiary-container": "#b8f9de",
                "tertiary-dim": "#1d5d49",
                "primary-container": "#d8e3fb",
                "secondary-fixed": "#d3e4fe",
                "on-primary": "#f6f7ff",
                "tertiary-fixed": "#b8f9de",
                "primary-fixed-dim": "#cad5ed",
                "background": "#f7f9fb",
                "surface-container-low": "#f0f4f7",
                "surface-variant": "#d9e4ea",
                "on-tertiary-container": "#22614d",
                "error": "#9f403d",
                "surface-tint": "#545f73",
                "surface-container-high": "#e1e9ee"
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
<!-- Subtle Background Architecture -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary-container/30 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-tertiary-container/20 rounded-full blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md z-10">
<!-- Logo & Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl mr-2">domain</span>
<span class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">Estate Metric</span>
</div>
<h1 class="text-headline-md font-headline font-bold text-on-surface mb-2">Welcome Home</h1>
<p class="text-body-md text-on-surface-variant">Sign in to your resident portal</p>
</div>
<!-- Login Card -->
<div class="surface-container-lowest glass-panel rounded-xl p-8 shadow-sm">
<form class="space-y-6">
<!-- Phone Number Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1" for="phone">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">smartphone</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary transition-all duration-200" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Send OTP Button -->
<button class="w-full py-3.5 bg-primary text-on-primary font-semibold rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                    Send OTP
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<!-- Hidden OTP Field (Displayed for demonstration, usually toggled via JS) -->
<div class="space-y-4 pt-2">
<div class="relative flex items-center justify-center space-x-4">
<div class="h-px bg-surface-container flex-grow"></div>
<span class="text-xs font-label uppercase tracking-widest text-outline-variant">Verification Code</span>
<div class="h-px bg-surface-container flex-grow"></div>
</div>
<div class="flex justify-between gap-2 max-w-[280px] mx-auto">
<!-- Mock OTP Inputs -->
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface" maxlength="1" placeholder="•" type="text"/>
</div>
<p class="text-center text-sm text-on-surface-variant">
                        Didn't receive code? <button class="text-primary font-semibold hover:underline" type="button">Resend</button>
</p>
</div>
<!-- Final Login CTA -->
<button class="w-full py-3.5 bg-primary text-on-primary font-bold rounded-lg shadow-md hover:opacity-95 active:scale-[0.98] transition-all" type="submit">
                    Login
                </button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center space-y-4">
<p class="text-body-md text-on-surface-variant">
                Looking for the owner portal? <a class="text-secondary font-semibold hover:underline" href="#">Click here</a>
</p>
<div class="flex justify-center items-center space-x-6">
<a class="text-xs text-outline-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="text-xs text-outline-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="text-xs text-outline-variant hover:text-on-surface transition-colors" href="#">Help Center</a>
</div>
</div>
</main>
<!-- Visual Background Element -->
<div class="fixed bottom-12 right-12 hidden lg:block max-w-xs opacity-40">
<div class="p-4 bg-surface-container-low rounded-xl transform rotate-3 scale-90">
<div class="flex items-center gap-3 mb-3">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="key">key</span>
</div>
<div>
<div class="h-2 w-24 bg-outline-variant/30 rounded-full"></div>
<div class="h-2 w-16 bg-outline-variant/20 rounded-full mt-2"></div>
</div>
</div>
<div class="space-y-2">
<div class="h-2 w-full bg-outline-variant/10 rounded-full"></div>
<div class="h-2 w-full bg-outline-variant/10 rounded-full"></div>
</div>
</div>
</div>
</body></html>
