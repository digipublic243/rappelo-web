version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rappelo-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-http://178.128.166.255:8000}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      SESSION_COOKIE_MAX_AGE: ${SESSION_COOKIE_MAX_AGE:-604800}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
    restart: unless-stopped
