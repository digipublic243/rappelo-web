version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rappelo-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000}
    restart: unless-stopped
