      summary: Terminate lease
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                move_out_date:
                  type: string
                  format: date
      responses:
        '200':
          description: Lease terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lease'

  /api/leases/leases/{id}/renew/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Leases]
      summary: Renew lease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_end_date]
              properties:
                new_end_date:
                  type: string
                  format: date
      responses:
        '200':
          description: Lease renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lease'

  /api/payments/payments/:
    get:
      tags: [Payments]
      summary: List payments
      responses:
        '200':
          description: Payments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
    post:
      tags: [Payments]
      summary: Create payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /api/payments/payments/{id}/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Payments]
      summary: Retrieve payment
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
    patch:
      tags: [Payments]
      summary: Update payment partially
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentUpdateRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
    put:
      tags: [Payments]
      summary: Update payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentUpdateRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
    delete:
      tags: [Payments]
      summary: Delete payment
      responses:
        '204':
          description: Deleted

  /api/payments/payments/{id}/confirm/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Payments]
      summary: Confirm payment (mark as paid)
      responses:
        '200':
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /api/payments/payments/overdue/:
    get:
      tags: [Payments]
      summary: List overdue pending payments
      responses:
        '200':
          description: Overdue payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer

  schemas:
    TokenPair:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

    MessageResponse:
      type: object
      properties:
        detail:
          type: string
        message:
          type: string

    UserCreateRequest:
      type: object
      required: [phone_number, password, password2]
      properties:
        phone_number:
          type: string
          maxLength: 15
        email:
          type: string
          format: email
          nullable: true
        first_name:
          type: string
        last_name:
          type: string
        password:
          type: string
          format: password
        password2:
          type: string
          format: password
        role:
          type: string
          enum: [landlord, tenant, property_manager, admin]
        date_of_birth:
          type: string
          format: date
          nullable: true

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          nullable: true
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [landlord, tenant, property_manager, admin]
        date_of_birth:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password, new_password2]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
        new_password2:
          type: string
          format: password

    UserList:
      type: object
      properties:
        id:
          type: integer
        phone_number:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        role:
          type: string
          enum: [landlord, tenant, property_manager, admin]
        is_active:
          type: boolean

    UserDetail:
      type: object
      properties:
        id:
          type: integer
        phone_number:
          type: string
        email:
          type: string
          format: email
          nullable: true
        first_name:
          type: string
        last_name:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [landlord, tenant, property_manager, admin]
        date_of_birth:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true

    UserStatistics:
      type: object
      properties:
        total_users:
          type: integer
        active_users:
          type: integer
        landlords:
          type: integer
        tenants:
          type: integer
        property_managers:
          type: integer

    Property:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        name:
          type: string
        property_type:
          type: string
          enum: [apartment, house, condo, townhouse, commercial, other]
        status:
          type: string
          enum: [active, inactive, maintenance, sold]
        address_line_1:
          type: string
        address_line_2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        description:
          type: string
          nullable: true
        year_built:
          type: integer
          nullable: true
        total_units:
          type: integer
        square_footage:
          type: integer
          nullable: true
        purchase_price:
          type: number
          format: double
          nullable: true
        current_value:
          type: number
          format: double
          nullable: true
        monthly_rent_total:
          type: number
          format: double
          nullable: true
        landlord:
          type: integer
        is_active:
          type: boolean

    Unit:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        property:
          type: integer
        unit_number:
          type: string
        unit_type:
          type: string
          enum: [studio, 1br, 2br, 3br, 4br, commercial, other]
        status:
          type: string
          enum: [vacant, occupied, maintenance, reserved]
        bedrooms:
          type: integer
        bathrooms:
          type: number
          format: double
        square_footage:
          type: integer
          nullable: true
        monthly_rent:
          type: number
          format: double
        security_deposit:
          type: number
          format: double
          nullable: true
        description:
          type: string
          nullable: true
        floor_number:
          type: integer
          nullable: true
