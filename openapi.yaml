openapi: 3.0.3

info:
  title: Rappelo API
  version: "1.0.0"
  description: |
    API de gestion immobilière Rappelo.
    Authentification par téléphone (mot de passe ou OTP).
    Tous les tokens sont des JWT Bearer.

servers:
  - url: http://localhost:8000
    description: Local

security:
  - bearerAuth: []

# ─────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Shared ──────────────────────────────
    TokenPair:
      type: object
      properties:
        access: { type: string }
        refresh: { type: string }

    PaginatedList:
      type: object
      properties:
        count: { type: integer }
        next: { type: string, nullable: true, format: uri }
        previous: { type: string, nullable: true, format: uri }
        results: { type: array, items: {} }

    Error:
      type: object
      properties:
        detail: { type: string }

    # ── Accounts ────────────────────────────
    UserCreate:
      type: object
      required: [phone_number, password, password2, role]
      properties:
        phone_number: { type: string, example: "+2507XXXXXXXX" }
        password: { type: string, format: password }
        password2: { type: string, format: password }
        role:
          type: string
          enum: [landlord, tenant, property_manager, admin]
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }

    UserShell:
      type: object
      properties:
        id: { type: integer }
        phone_number: { type: string }
        email: { type: string, nullable: true }
        first_name: { type: string }
        last_name: { type: string }
        full_name: { type: string }
        role: { type: string }
        is_active: { type: boolean }
        date_joined: { type: string, format: date-time }

    # ── Properties ──────────────────────────
    PropertyCreate:
      type: object
      required: [name, address_content]
      properties:
        name: { type: string }
        property_type:
          type: string
          enum: [apartment, house, condo, townhouse, commercial, other]
        status:
          type: string
          enum: [active, inactive, maintenance, sold]
        address_content: { type: string }
        city: { type: string, example: kinshasa }
        country: { type: string, example: "RD CONGO" }
        description: { type: string }
        total_units: { type: integer, default: 1 }

    PropertyList:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        property_type: { type: string }
        status: { type: string }
        landlord_name: { type: string }
        total_units: { type: integer }
        manager_count: { type: integer }
        monthly_rent_total: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Units ───────────────────────────────
    UnitCreate:
      type: object
      required: [unit_number, rent]
      properties:
        unit_number: { type: string }
        unit_type:
          type: string
          enum: [studio, 1br, 2br, 3br, 4br, commercial, other]
        rent: { type: string, format: decimal, example: "450.00" }
        currency: { type: string, default: USD }
        rental_periodicity:
          type: string
          enum: [journ, hebdo, mensuel, autre]
          default: mensuel
        description: { type: string }
        is_furnished: { type: boolean, default: false }

    UnitResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        property: { type: string, format: uuid }
        unit_number: { type: string }
        unit_type: { type: string }
        status: { type: string }
        rent: { type: string }
        currency: { type: string }
        rental_periodicity: { type: string }
        description: { type: string }
        is_furnished: { type: boolean }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Tenant Profile ───────────────────────
    TenantProfileCreate:
      type: object
      required: [alternate_phone]
      description: |
        Crée simultanément un `User` (rôle `tenant`) dont le `phone_number` est
        `alternate_phone`, et son `TenantProfile`.
      properties:
        alternate_phone:
          type: string
          maxLength: 15
          description: >
            Numéro de téléphone principal du locataire.
            Ce champ est **requis à la création** : il sera utilisé comme
            `phone_number` du compte utilisateur créé automatiquement.
          example: "+22900000001"
        alternate_email:
          type: string
          format: email
        id_card:
          type: string
          format: binary
          description: Upload de la pièce d'identité (multipart/form-data)
        marital_status:
          type: string
          enum: [single, married, divorced, widowed, separated]
        employment_status:
          type: string
          enum:
            [
              employed,
              self_employed,
              unemployed,
              student,
              retired,
              military,
              officer,
            ]
        notes: { type: string }

    TenantProfileUpdate:
      type: object
      description: Tous les champs sont optionnels lors d'un PATCH.
      properties:
        alternate_phone:
          type: string
          maxLength: 15
        alternate_email:
          type: string
          format: email
        id_card:
          type: string
          format: binary
        marital_status:
          type: string
          enum: [single, married, divorced, widowed, separated]
        employment_status:
          type: string
          enum:
            [
              employed,
              self_employed,
              unemployed,
              student,
              retired,
              military,
              officer,
            ]
        notes: { type: string }
        is_active: { type: boolean }

    TenantProfileList:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_full_name: { type: string }
        user_phone_number: { type: string }
        user_email: { type: string, nullable: true }
        id_card: { type: string, nullable: true }
        alternate_phone: { type: string, nullable: true }
        alternate_email: { type: string, nullable: true }
        marital_status: { type: string, nullable: true }
        employment_status: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        emergency_contacts_count: { type: integer }
        employment_info_count: { type: integer }
        references_count: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TenantProfileDetail:
      allOf:
        - $ref: "#/components/schemas/TenantProfileList"
        - type: object
          properties:
            user:
              type: object
              properties:
                id: { type: integer }
                phone_number: { type: string }
                email: { type: string, nullable: true }
                first_name: { type: string }
                last_name: { type: string }
                full_name: { type: string }
                role: { type: string }
                is_active: { type: boolean }
                date_joined: { type: string, format: date-time }
            emergency_contacts: { type: array, items: {} }
            employment_info: { type: array, items: {} }
            references: { type: array, items: {} }

    # ── Booking ─────────────────────────────
    BookingCreate:
      type: object
      required: [unit, check_in, check_out]
      properties:
        unit: { type: string, format: uuid }
        check_in: { type: string, format: date }
        check_out: { type: string, format: date }
        preferred_move_in_time:
          type: string
          enum: [morning, afternoon, evening]
        occupants_count: { type: integer, default: 1 }
        adults_count: { type: integer }
        children_count: { type: integer, default: 0 }
        has_pets: { type: boolean, default: false }
        pet_details: { type: string }
        monthly_income_estimate: { type: string, format: decimal }
        employment_status_snapshot: { type: string }
        emergency_contact_name: { type: string }
        emergency_contact_phone: { type: string }
        id_document_url: { type: string, format: uri }
        selfie_url: { type: string, format: uri }
        stay_purpose: { type: string }
        special_requests: { type: string }
        source_channel: { type: string }
        booking_deposit: { type: string, format: decimal }
        notes: { type: string }

    # ── Payment ─────────────────────────────
    PaymentLinkRequest:
      type: object
      required: [gateway]
      properties:
        gateway:
          type: string
          enum: [cash, bank_transfer, easypay]
        expires_in_hours: { type: integer, default: 48 }

    PaymentLinkResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        payment: { type: string, format: uuid }
        token: { type: string, format: uuid }
        amount: { type: string }
        gateway: { type: string }
        status: { type: string, enum: [active, expired, used] }
        expires_at: { type: string, format: date-time }
        gateway_url: { type: string }
        gateway_reference: { type: string }
        link_url: { type: string, format: uri }
        created_at: { type: string, format: date-time }

    PaymentSummary:
      type: object
      properties:
        total_paid: { type: number }
        total_pending: { type: number }
        total_overdue: { type: number }
        count_paid: { type: integer }
        count_pending: { type: integer }
        count_overdue: { type: integer }

    # ── Discount ────────────────────────────
    DiscountCreate:
      type: object
      required: [name, discount_type, value]
      properties:
        name: { type: string }
        discount_type:
          type: string
          enum: [percent, fixed]
        value: { type: string, format: decimal }
        scope: { type: string, enum: [global, per_tenant] }
        unit: { type: string, format: uuid, nullable: true }
        lease: { type: string, format: uuid, nullable: true }
        valid_from: { type: string, format: date }
        valid_until: { type: string, format: date }
        is_active: { type: boolean, default: true }

# ─────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────
paths:
  # ═══════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════
  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Login par mot de passe
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, password]
              properties:
                phone_number: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Tokens JWT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          description: Identifiants invalides
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/refresh/:
    post:
      tags: [Auth]
      summary: Rafraîchir le token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh: { type: string }
      responses:
        "200":
          description: Nouveau access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access: { type: string }

  /api/auth/verify/:
    post:
      tags: [Auth]
      summary: Vérifier un token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200": { description: Token valide }
        "401": { description: Token invalide }

  /api/auth/otp/request/:
    post:
      tags: [Auth]
      summary: Demander un code OTP
      security: []
      description: |
        Le code OTP est envoyé par SMS (en prod).
        En dev (`DEBUG=True`), il est affiché dans la console du serveur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number]
              properties:
                phone_number: { type: string }
      responses:
        "200": { description: OTP envoyé }
        "400": { description: Numéro invalide }

  /api/auth/otp/verify/:
    post:
      tags: [Auth]
      summary: Vérifier le code OTP et obtenir des tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, code]
              properties:
                phone_number: { type: string }
                code: { type: string, example: "123456" }
      responses:
        "200":
          description: Tokens JWT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "400": { description: Code invalide ou expiré }

  # ═══════════════════════════════════════════
  # ACCOUNTS
  # ═══════════════════════════════════════════
  /api/accounts/users/:
    post:
      tags: [Accounts]
      summary: Créer un compte utilisateur
      security: []
      description: |
        Inscription classique (landlord, property_manager, admin).
        **Note :** pour créer un locataire (tenant), préférer
        `POST /api/tenants/profiles/` qui crée l'utilisateur et son profil en une seule étape.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreate" }
      responses:
        "201": { description: Utilisateur créé }
        "400": { description: Erreur de validation }

  /api/accounts/users/me/:
    get:
      tags: [Accounts]
      summary: Profil de l'utilisateur connecté (complet)
      responses:
        "200":
          description: Profil complet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserShell" }

  /api/accounts/users/shell_profile/:
    get:
      tags: [Accounts]
      summary: Profil shell (navigation, header)
      description: |
        Données légères pour alimenter le header / shell de l'app.
        À appeler juste après le login.
      responses:
        "200":
          description: Données shell
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserShell" }

  # ═══════════════════════════════════════════
  # PROPERTIES
  # ═══════════════════════════════════════════
  /api/properties/properties/:
    get:
      tags: [Properties]
      summary: Liste des propriétés
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive, maintenance, sold] }
        - in: query
          name: property_type
          schema:
            {
              type: string,
              enum: [apartment, house, condo, townhouse, commercial, other],
            }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: country
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
          description: Cherche dans name, address_content, city, description
        - in: query
          name: ordering
          schema: { type: string, enum: [created_at, "-created_at", name] }
        - in: query
          name: page
          schema: { type: integer }
      responses:
        "200":
          description: Liste paginée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      results:
                        type: array
                        items: { $ref: "#/components/schemas/PropertyList" }
    post:
      tags: [Properties]
      summary: Créer une propriété
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PropertyCreate" }
      responses:
        "201": { description: Propriété créée }
        "400": { description: Erreur de validation }

  /api/properties/properties/{id}/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Properties]
      summary: Détail d'une propriété
      responses:
        "200": { description: Propriété }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Properties]
      summary: Modifier une propriété
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PropertyCreate" }
      responses:
        "200": { description: Propriété mise à jour }
    delete:
      tags: [Properties]
      summary: Supprimer une propriété
      responses:
        "204": { description: Supprimé }

  /api/properties/properties/{id}/enriched/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Properties]
      summary: Détail enrichi (amenities, media, branding)
      responses:
        "200": { description: Propriété enrichie }

  /api/properties/properties/{id}/activate/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Properties]
      summary: Activer une propriété
      responses:
        "200": { description: Propriété activée }

  /api/properties/properties/{id}/deactivate/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Properties]
      summary: Désactiver une propriété
      responses:
        "200": { description: Propriété désactivée }

  /api/properties/properties/{id}/financials/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Properties]
      summary: Données financières d'une propriété
      responses:
        "200": { description: Données financières }

  /api/properties/properties/{id}/statistics/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Properties]
      summary: Statistiques d'une propriété
      responses:
        "200": { description: Statistiques }

  /api/properties/properties/{id}/assign_manager/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Properties]
      summary: Assigner un gestionnaire
      responses:
        "200": { description: Gestionnaire assigné }

  /api/properties/properties/{id}/managers/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Properties]
      summary: Gestionnaires d'une propriété
      responses:
        "200": { description: Liste des gestionnaires }

  /api/properties/managers/:
    get:
      tags: [Properties]
      summary: Liste des gestionnaires
      responses:
        "200": { description: Liste paginée }

  /api/properties/managers/{id}/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Properties]
      summary: Modifier un gestionnaire
      responses:
        "200": { description: Gestionnaire mis à jour }

  /api/properties/managers/{id}/update_permissions/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Properties]
      summary: Mettre à jour les permissions d'un gestionnaire
      responses:
        "200": { description: Permissions mises à jour }

  /api/properties/managers/{id}/remove/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Properties]
      summary: Retirer un gestionnaire
      responses:
        "200": { description: Gestionnaire retiré }

  # ── Units ─────────────────────────────────
  /api/properties/units/:
    get:
      tags: [Units]
      summary: Liste des unités
      parameters:
        - in: query
          name: status
          schema:
            { type: string, enum: [vacant, occupied, maintenance, reserved] }
        - in: query
          name: unit_type
          schema:
            {
              type: string,
              enum: [studio, 1br, 2br, 3br, 4br, commercial, other],
            }
        - in: query
          name: is_furnished
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer }
      responses:
        "200":
          description: Liste paginée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      results:
                        type: array
                        items: { $ref: "#/components/schemas/UnitResponse" }
    post:
      tags: [Units]
      summary: Créer une unité
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitCreate" }
      responses:
        "201":
          description: Unité créée
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitResponse" }
        "400": { description: Erreur de validation }

  /api/properties/units/available/:
    get:
      tags: [Units]
      summary: Unités disponibles (vacantes)
      parameters:
        - in: query
          name: property_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Unités disponibles }

  /api/properties/units/{id}/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Units]
      summary: Détail d'une unité
      responses:
        "200":
          {
            description: Détail complet incluant bedrooms,
            security_deposit,
            current_tenant,
            current_lease,
          }
    patch:
      tags: [Units]
      summary: Modifier une unité
      responses:
        "200": { description: Unité mise à jour }

  /api/properties/units/{id}/activate/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Units]
      summary: Activer une unité
      responses:
        "200": { description: Unité activée }

  /api/properties/units/{id}/deactivate/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Units]
      summary: Désactiver une unité
      responses:
        "200": { description: Unité désactivée }

  /api/properties/units/{id}/update_status/:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Units]
      summary: Changer le statut d'une unité
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [vacant, occupied, maintenance, reserved]
      responses:
        "200": { description: Statut mis à jour }

  # ═══════════════════════════════════════════
  # TENANTS
  # ═══════════════════════════════════════════
  /api/tenants/profiles/:
    get:
      tags: [Tenants]
      summary: Liste des profils locataires
      parameters:
        - in: query
          name: employment_status
          schema:
            type: string
            enum:
              [
                employed,
                self_employed,
                unemployed,
                student,
                retired,
                military,
                officer,
              ]
        - in: query
          name: is_active
          schema: { type: boolean }
      responses:
        "200":
          description: Liste paginée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          { $ref: "#/components/schemas/TenantProfileList" }
    post:
      tags: [Tenants]
      summary: Créer un profil locataire
      description: |
        Crée **en une seule requête** :
        1. Un `User` avec `role=tenant` et `phone_number=alternate_phone`
           (compte sans mot de passe utilisable — le locataire devra passer par OTP).
        2. Le `TenantProfile` lié.

        `alternate_phone` est **obligatoire** à la création.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/TenantProfileCreate" }
          application/json:
            schema: { $ref: "#/components/schemas/TenantProfileCreate" }
      responses:
        "201":
          description: Profil créé
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantProfileList" }
        "400":
          description: Numéro déjà utilisé ou validation échouée
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

