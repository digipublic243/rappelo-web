          type: integer
        tenant:
          type: integer
        amount:
          type: number
          format: double
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [pending, paid, failed, refunded]
        payment_method:
          type: string
          enum: [cash, bank_transfer, card, mobile_money, other]
        transaction_reference:
          type: string
          maxLength: 120
        notes:
          type: string
        is_active:
          type: boolean

    PaymentUpdateRequest:
      type: object
      properties:
        lease:
          type: integer
        tenant:
          type: integer
        amount:
          type: number
          format: double
        due_date:
          type: string
          format: date
        status:
          type: string
