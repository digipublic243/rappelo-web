openapi: 3.0.3
info:
  title: Rappelo API
  version: 1.0.0
  description: |
    OpenAPI specification for Rappelo backend.
    This file is manually aligned with the currently implemented DRF routers/viewsets.
servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Auth
  - name: Accounts
  - name: Properties
  - name: Tenants
  - name: Leases
  - name: Payments

security:
  - bearerAuth: []

paths:
  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Obtain JWT token pair (login)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, password]
              properties:
                phone_number:
                  type: string
                  example: "+1234567890"
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: JWT token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials

  /api/auth/refresh/:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh:
                  type: string
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string

  /api/auth/verify/:
    post:
      tags: [Auth]
      summary: Verify token validity
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token is valid
        '401':
          description: Token is invalid or expired

  /api/accounts/users/:
    get:
      tags: [Accounts]
      summary: List users
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserList'
    post:
      tags: [Accounts]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/accounts/users/{id}/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Accounts]
      summary: Retrieve user
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '403':
          description: Forbidden
    patch:
      tags: [Accounts]
      summary: Update user partially
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
    put:
      tags: [Accounts]
      summary: Update user
      requestBody:
        required: true
        content:
          application/json:
            schema:
